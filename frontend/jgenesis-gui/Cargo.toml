[package]
name = "jgenesis-gui"
version = "0.12.1"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
default = ["sdl3-build-from-source"]
unstable-cores = ["jgenesis-native-driver/pce"]

sdl3-build-from-source = ["sdl3/build-from-source"]
sdl3-static-link = ["sdl3/static-link"]

[dependencies]
jgenesis-common = { workspace = true, features = ["serde"] }
jgenesis-proc-macros = { workspace = true }

genesis-core = { workspace = true }
nes-core = { workspace = true }
segacd-core = { workspace = true }
smsgg-core = { workspace = true }
snes-core = { workspace = true }

gb-config = { workspace = true }
gba-config = { workspace = true }
genesis-config = { workspace = true }
nes-config = { workspace = true }
smsgg-config = { workspace = true }
snes-config = { workspace = true }

jgenesis-native-config = { workspace = true}
jgenesis-native-driver = { workspace = true }
jgenesis-renderer = { workspace = true }
egui-sdl3-platform = { workspace = true }

anyhow = { workspace = true }
clap = { workspace = true }
eframe = { workspace = true }
egui = { workspace = true }
egui_extras = { workspace = true }
egui-wgpu = { workspace = true }
emath = { workspace = true }
env_logger = { workspace = true }
log = { workspace = true, features = ["release_max_level_info"] }
pollster = { workspace = true }
regex = { workspace = true }
rfd = { workspace = true }
sdl3 = { workspace = true }
time = { workspace = true, features = ["formatting", "local-offset"] }
toml = { workspace = true }
wgpu = { workspace = true }

[target.'cfg(all(unix, not(target_os = "macos")))'.dependencies]
xrandr = { workspace = true }

[package.metadata.packager]
icons = ["../32x32.png"]
# Nightly toolchain used because of -Ztune-cpu codegen arg
# Statically link SDL3 because otherwise the AppImage fails to build when building SDL3 from source
before-packaging-command = """
RUSTFLAGS='-C target-cpu=x86-64-v2 -Z tune-cpu=x86-64-v3' \
JGENESIS_APPIMAGE_BUILD=1 \
cargo +nightly build --profile release-lto --features sdl3-static-link"""

[package.metadata.packager.appimage]
# Including any Wayland-related libraries in the AppImage package can cause the app to fail to start on some distros,
# such as Solus Plasma; having mismatched Wayland library versions seems to cause wgpu to fail to load graphics libraries
excludedLibs = ["libwayland*"]

[lints]
workspace = true
