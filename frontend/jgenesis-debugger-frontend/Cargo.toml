[package]
name = "jgenesis-debugger-frontend"
version = "0.1.0"
edition = "2024"

[features]
default = []
pce = ["dep:pce-core"]

[dependencies]
jgenesis-common = { workspace = true }

m68000-emu = { workspace = true }
sh2-emu = { workspace = true }
z80-emu = { workspace = true }

genesis-config = { workspace = true }

gb-core = { workspace = true }
gba-core = { workspace = true }
genesis-core = { workspace = true }
nes-core = { workspace = true }
pce-core = { workspace = true, optional = true }
s32x-core = { workspace = true }
segacd-core = { workspace = true }
smsgg-core = { workspace = true }
snes-core = { workspace = true }

egui-sdl3-platform = { workspace = true }
jgenesis-native-config = { workspace = true }
jgenesis-renderer = { workspace = true }

bytemuck = { workspace = true }
egui = { workspace = true }
egui_extras = { workspace = true, features = ["image"] }
egui-wgpu = { workspace = true }
image = { workspace = true, features = ["png"] } # Needed for egui png loading
log = { workspace = true }
pollster = { workspace = true }
rand = { workspace = true }
rfd = { workspace = true }
sdl3 = { workspace = true }
thiserror = { workspace = true }
wgpu = { workspace = true }

[lints]
workspace = true
