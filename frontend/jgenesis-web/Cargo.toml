[package]
name = "jgenesis-web"
version = "0.7.1"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
crate-type = ["cdylib"]

[target.'cfg(target_arch = "wasm32")'.dependencies]
gba-core = { workspace = true }
genesis-core = { workspace = true }
s32x-core = { workspace = true }
segacd-core = { workspace = true }
smsgg-core = { workspace = true }
snes-core = { workspace = true }

gba-config = { workspace = true, features = ["serde"] }
genesis-config = { workspace = true, features = ["serde"] }
smsgg-config = { workspace = true, features = ["serde"] }
snes-config = { workspace = true, features = ["serde"] }

jgenesis-common = { workspace = true, features = ["serde"] }
jgenesis-proc-macros = { workspace = true }
jgenesis-renderer = { workspace = true, features = ["serde"] }

anyhow = { workspace = true }
bincode = { workspace = true }
console_error_panic_hook = { workspace = true }
console_log = { workspace = true }
getrandom = { workspace = true, features = ["wasm_js"] }
js-sys = { workspace = true }
log = { workspace = true, features = ["release_max_level_info"] }
rand = { workspace = true }
rfd = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
web-time = { workspace = true }
wgpu = { workspace = true, features = ["webgl"] }
winit = { workspace = true, features = ["serde"] }

[target.'cfg(target_arch = "wasm32")'.dependencies.web-sys]
version = "0.3"
features = [
    "Window",
    "Document",
    "Element",
    "AudioContext",
    "AudioContextOptions",
    "AudioWorklet",
    "AudioWorkletNode",
    "AudioWorkletNodeOptions",
    "AudioDestinationNode",
    "ChannelCountMode",
    "Performance",
]

[lints]
workspace = true
